<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>


    <script>
        const salario = prompt('Digite seu salário:')
        const cargo = prompt('Digite seu cargo:')
        let aumento = 0

        switch(cargo) {
            case 'Estagiário':
            aumento = 2;
            break;

            case 'Analista':
            aumento = 1.5;
            break;

            case 'Gerente':
            aumento = 1.3;
            break;

            case 'Presidente':
            aumento = 1.1;
            break;

            default: alert('Favor digitar um cargo válido!')
        } 
        //const novoSalario = salario + (salario * aumento)
        //const novoSalario = salario * (1 + aumento)
        const novoSalario = salario *  aumento
        console.log('O novo salário é R$ : ' + novoSalario)

    </script> 
</body>
</html>
