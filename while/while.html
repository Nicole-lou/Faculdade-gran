<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While/Do while</title>
</head>
<body>
    

    <script>
        let contador = 1
        const quantidade = prompt('Digite quantas repetições você deseja:')

        while (contador <= quantidade) {
            console.log(contador)
            contador++
        }
    </script>
</body>
</html>
